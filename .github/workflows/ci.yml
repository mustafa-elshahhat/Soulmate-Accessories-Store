name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'
        
    - name: Restore dependencies
      run: |
        dotnet restore SoulmateStore.csproj
        dotnet restore Tests/SoulmateStore.Tests.csproj
      working-directory: backend
      
    - name: Build
      run: |
        dotnet build SoulmateStore.csproj --no-restore --configuration Release
        dotnet build Tests/SoulmateStore.Tests.csproj --no-restore --configuration Release
      working-directory: backend
      
    - name: Test
      run: dotnet test Tests/SoulmateStore.Tests.csproj --no-build --verbosity normal --configuration Release
      working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      working-directory: frontend
      
    - name: Lint
      run: npm run lint
      working-directory: frontend
      
    - name: Build
      run: npm run build
      working-directory: frontend
