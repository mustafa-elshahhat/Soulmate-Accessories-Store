<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <script>try{var l=localStorage.getItem('soulmate_lang');if(l==='ar'){document.documentElement.lang='ar';document.documentElement.dir='rtl';document.documentElement.classList.add('lang-resolving')}}catch(e){}</script>
  <title>Soulmate Store</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Soulmate Store — Personalized gifts & custom gift boxes. سولميت ستور — هدايا مخصصة وبوكسات هدايا فاخرة.">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="apple-mobile-web-app-title" content="Soulmate">
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
  <link rel="dns-prefetch" href="https://res.cloudinary.com">
  <link rel="preload" href="/assets/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/assets/fonts/playfair-display-700.woff2" as="font" type="font/woff2" crossorigin>


  <!-- Organization Schema (global) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Soulmate Store",
    "alternateName": "سولميت ستور",
    "url": "https://soulmate-store.com",
    "logo": "https://soulmate-store.com/assets/images/logo.png",
    "description": "Personalized gifts, custom gift boxes, and engraved couple gifts.",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "customer service",
      "availableLanguage": ["Arabic", "English"]

  }

</head>
<body>
  <script>try{if(localStorage.getItem('has_session')==='1')document.body.classList.add('has-session')}catch(e){}</script>

</html>
